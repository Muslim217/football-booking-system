spring:
  application:
    name: football-booking-system
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jwt:
  # Dev: захардкоженный секрет (только для разработки!)
  # Prod: передавай через переменную окружения -DJWT_SECRET=... или export JWT_SECRET=...
  secret: ${JWT_SECRET:ZmQ0ZDExNjIzMDUyMGRmOTBhZjQ1MmQ1MmQ3ZWYwOGIyMWYyNjNiZDQ0NWJiZTRkMzY0YzQxN2E4MzUzYmYwMQ==}
  expiration: 3600000           # 1 час (access token)
  refresh-expiration: 2592000000 # 30 дней (refresh token)

---
# Dev Profile (H2 Database)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/footballdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

---
# Production Profile (PostgreSQL)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/footballdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
