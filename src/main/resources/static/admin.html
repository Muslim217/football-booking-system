<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — Stadium</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&f[]=general-sans@400,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
    .stat-card { background: var(--color-surface); border-radius: var(--radius-md); padding: var(--space-5); box-shadow: var(--shadow-card); }
    .stat-value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--color-primary); line-height: 1; margin-bottom: var(--space-1); font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 0.8125rem; color: var(--color-text-muted); }
    .table-wrap { background: var(--color-surface); border-radius: var(--radius-md); box-shadow: var(--shadow-card); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--color-bg); }
    th { padding: var(--space-3) var(--space-4); text-align: left; font-size: 0.75rem; font-weight: 600; color: var(--color-text-muted); letter-spacing: .05em; text-transform: uppercase; }
    td { padding: var(--space-3) var(--space-4); font-size: 0.875rem; color: var(--color-text); border-top: 1px solid var(--color-border); font-variant-numeric: tabular-nums; }
    tr:hover td { background: var(--color-bg); }
    .action-btn { background: none; border: none; cursor: pointer; padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); font-size: 0.8125rem; font-weight: 500; transition: background .15s; }
    .action-btn.cancel { color: var(--color-danger); }
    .action-btn.cancel:hover { background: #fef2f2; }
    .action-btn.confirm { color: var(--color-primary); }
    .action-btn.confirm:hover { background: var(--color-primary-soft); }
    .tab-bar { display: flex; gap: var(--space-1); margin-bottom: var(--space-5); background: var(--color-surface); border-radius: var(--radius-md); padding: var(--space-1); box-shadow: var(--shadow-card); width: fit-content; }
    .tab-btn { padding: var(--space-2) var(--space-4); border-radius: var(--radius-sm); border: none; background: none; font-size: 0.875rem; font-weight: 500; color: var(--color-text-muted); cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: var(--color-primary); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .search-row { display: flex; gap: var(--space-3); margin-bottom: var(--space-4); align-items: center; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: var(--space-3) var(--space-4); border: 1.5px solid var(--color-border); border-radius: var(--radius-sm); font-size: 0.875rem; font-family: var(--font-body); color: var(--color-text); background: var(--color-surface); transition: border-color .15s; }
    .search-input:focus { outline: none; border-color: var(--color-primary); }
    select.search-input { cursor: pointer; }
    .empty-state { text-align: center; padding: var(--space-10) var(--space-4); color: var(--color-text-muted); font-size: 0.9375rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">Stadium</a>
    <div class="navbar-links">
      <span class="badge badge-danger" style="font-size:.75rem; padding: 4px 10px;">Админ</span>
      <a href="index.html" class="nav-link">Поля</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Выйти</button>
    </div>
  </nav>

  <main class="container" style="padding-top: var(--space-6); padding-bottom: var(--space-10);">
    <div style="margin-bottom: var(--space-6);">
      <h1 class="page-title">Панель администратора</h1>
      <p style="color: var(--color-text-muted); font-size: .9375rem; margin-top: var(--space-1);">Управление всеми бронированиями и полями</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-value" id="totalBookings">—</div>
        <div class="stat-label">Всего бронирований</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="activeBookings">—</div>
        <div class="stat-label">Активные</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalFields">—</div>
        <div class="stat-label">Полей</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalUsers">—</div>
        <div class="stat-label">Пользователей</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="bookings">Бронирования</button>
      <button class="tab-btn" data-tab="fields">Поля</button>
      <button class="tab-btn" data-tab="users">Пользователи</button>
    </div>

    <!-- Bookings Tab -->
    <div class="tab-content active" id="tab-bookings">
      <div class="search-row">
        <input type="text" class="search-input" id="bookingSearch" placeholder="Поиск по имени, полю...">
        <select class="search-input" id="statusFilter" style="max-width: 180px;">
          <option value="">Все статусы</option>
          <option value="CONFIRMED">Подтверждено</option>
          <option value="PENDING">Ожидание</option>
          <option value="CANCELLED">Отменено</option>
          <option value="COMPLETED">Завершено</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Пользователь</th>
              <th>Поле</th>
              <th>Дата</th>
              <th>Время</th>
              <th>Сумма</th>
              <th>Статус</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="bookingsTbody">
            <tr><td colspan="8" class="empty-state">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Fields Tab -->
    <div class="tab-content" id="tab-fields">
      <div class="search-row">
        <input type="text" class="search-input" id="fieldSearch" placeholder="Поиск по названию, городу...">
        <button class="btn btn-primary btn-sm" id="addFieldBtn">+ Добавить поле</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Название</th>
              <th>Тип</th>
              <th>Город</th>
              <th>Цена/ч</th>
              <th>Владелец</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="fieldsTbody">
            <tr><td colspan="7" class="empty-state">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Users Tab -->
    <div class="tab-content" id="tab-users">
      <div class="search-row">
        <input type="text" class="search-input" id="userSearch" placeholder="Поиск по имени, email...">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Имя</th>
              <th>Email</th>
              <th>Роль</th>
              <th>Бронирований</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="usersTbody">
            <tr><td colspan="6" class="empty-state">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    // Guard: only ADMIN
    (function() {
      const token = localStorage.getItem('token');
      const role  = localStorage.getItem('role');
      if (!token || role !== 'ADMIN') { window.location.href = 'login.html'; }
    })();

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.clear(); window.location.href = 'login.html';
    });

    function statusBadge(status) {
      const map = { CONFIRMED: 'badge-primary', PENDING: 'badge-warning', CANCELLED: 'badge-danger', COMPLETED: 'badge-neutral' };
      const labels = { CONFIRMED: 'Подтверждено', PENDING: 'Ожидание', CANCELLED: 'Отменено', COMPLETED: 'Завершено' };
      return `<span class="badge ${map[status] || 'badge-neutral'}">${labels[status] || status}</span>`;
    }

    function roleBadge(role) {
      const map = { ADMIN: 'badge-danger', OWNER: 'badge-info', USER: 'badge-neutral' };
      return `<span class="badge ${map[role] || 'badge-neutral'}">${role}</span>`;
    }

    // Load bookings
    async function loadBookings() {
      try {
        const data = await apiGet('/api/bookings/all');
        const rows = Array.isArray(data) ? data : (data.content || []);
        document.getElementById('totalBookings').textContent = rows.length;
        document.getElementById('activeBookings').textContent = rows.filter(b => b.status === 'CONFIRMED').length;
        renderBookings(rows);
      } catch(e) {
        document.getElementById('bookingsTbody').innerHTML = `<tr><td colspan="8" class="empty-state">Нет доступа или данных</td></tr>`;
      }
    }

    function renderBookings(rows) {
      const q = document.getElementById('bookingSearch').value.toLowerCase();
      const st = document.getElementById('statusFilter').value;
      const filtered = rows.filter(b => {
        const match = !q || (b.userName||'').toLowerCase().includes(q) || (b.fieldName||'').toLowerCase().includes(q);
        const statusMatch = !st || b.status === st;
        return match && statusMatch;
      });
      if (!filtered.length) {
        document.getElementById('bookingsTbody').innerHTML = `<tr><td colspan="8" class="empty-state">Бронирования не найдены</td></tr>`;
        return;
      }
      document.getElementById('bookingsTbody').innerHTML = filtered.map((b, i) => `
        <tr>
          <td>${b.id}</td>
          <td>${b.userName || '—'}</td>
          <td>${b.fieldName || '—'}</td>
          <td>${b.date || '—'}</td>
          <td>${b.startTime || '—'} – ${b.endTime || '—'}</td>
          <td>${b.totalPrice != null ? b.totalPrice + ' ₽' : '—'}</td>
          <td>${statusBadge(b.status)}</td>
          <td>
            ${b.status === 'CONFIRMED' ? `<button class="action-btn cancel" onclick="cancelBooking(${b.id})">Отменить</button>` : ''}
            ${b.status === 'PENDING'   ? `<button class="action-btn confirm" onclick="confirmBooking(${b.id})">Подтвердить</button>` : ''}
          </td>
        </tr>`).join('');
    }

    let allBookings = [];
    async function init() {
      try {
        const data = await apiGet('/api/bookings/all');
        allBookings = Array.isArray(data) ? data : (data.content || []);
        document.getElementById('totalBookings').textContent = allBookings.length;
        document.getElementById('activeBookings').textContent = allBookings.filter(b => b.status === 'CONFIRMED').length;
        renderBookings(allBookings);
      } catch(e) {}

      try {
        const fields = await apiGet('/api/fields');
        const rows = Array.isArray(fields) ? fields : (fields.content || []);
        document.getElementById('totalFields').textContent = rows.length;
        document.getElementById('fieldsTbody').innerHTML = rows.length ? rows.map(f => `
          <tr>
            <td>${f.id}</td>
            <td>${f.name}</td>
            <td><span class="badge badge-info">${f.fieldType || f.type || '—'}</span></td>
            <td>${f.city || '—'}</td>
            <td>${f.pricePerHour} ₽</td>
            <td>${f.ownerName || '—'}</td>
            <td><button class="action-btn cancel" onclick="deleteField(${f.id})">Удалить</button></td>
          </tr>`).join('') : `<tr><td colspan="7" class="empty-state">Нет полей</td></tr>`;
      } catch(e) {}

      document.getElementById('totalUsers').textContent = '—';
      document.getElementById('usersTbody').innerHTML = `<tr><td colspan="6" class="empty-state">API /api/users не реализован</td></tr>`;
    }

    document.getElementById('bookingSearch').addEventListener('input', () => renderBookings(allBookings));
    document.getElementById('statusFilter').addEventListener('change', () => renderBookings(allBookings));

    async function cancelBooking(id) {
      if (!confirm('Отменить бронирование #' + id + '?')) return;
      try { await apiDelete('/api/bookings/' + id); init(); } catch(e) { alert('Ошибка: ' + e.message); }
    }

    async function confirmBooking(id) {
      try { await apiPatch('/api/bookings/' + id + '/confirm'); init(); } catch(e) { alert('Ошибка: ' + e.message); }
    }

    async function deleteField(id) {
      if (!confirm('Удалить поле #' + id + '?')) return;
      try { await apiDelete('/api/fields/' + id); init(); } catch(e) { alert('Ошибка: ' + e.message); }
    }

    init();
  </script>
</body>
</html>
