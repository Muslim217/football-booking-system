<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Площадка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><span class="brand-icon">⚽</span> Площадка</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="container content-wrapper">
    <div class="page-header">
        <h3 class="section-title mb-0">Админ-панель</h3>
    </div>

    <div id="alert-container"></div>

    <h4 class="section-title mt-2 mb-3">Все поля</h4>
    <div id="fields-container">
        <div class="text-center py-5"><div class="spinner-border text-success"></div></div>
    </div>

    <h4 class="section-title mt-5 mb-3">Все бронирования</h4>
    <div id="all-bookings-container">
        <div class="text-center py-3"><div class="spinner-border text-success spinner-border-sm"></div></div>
    </div>
</div>

<footer><div class="container">Площадка &copy; 2026 — Бронирование футбольных полей</div></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    if (!isLoggedIn() || !isAdmin()) window.location.href = '/';

    async function loadFields() {
        const container = document.getElementById('fields-container');
        try {
            const resp = await fetch(API_BASE + '/fields');
            if (!resp.ok) throw new Error();
            const fields = await resp.json();
            if (fields.length === 0) { container.innerHTML = '<p class="text-muted">Нет полей</p>'; return; }
            container.innerHTML = `
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead><tr><th>ID</th><th>Название</th><th>Владелец</th><th>Адрес</th><th>Тип</th><th>Цена/час</th></tr></thead>
                            <tbody>${fields.map(f => `
                                <tr><td>${f.id}</td><td><strong>${f.name}</strong></td><td>${f.ownerUsername || '—'}</td><td>${f.address}</td>
                                <td><span class="field-type-badge ${f.fieldType === 'INDOOR' ? 'indoor' : 'outdoor'}">${fieldTypeLabel(f.fieldType)}</span></td>
                                <td>${formatPrice(f.pricePerHour)}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        } catch { container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>'; }
    }

    async function loadAllBookings() {
        const container = document.getElementById('all-bookings-container');
        try {
            const resp = await apiFetch('/bookings');
            if (!resp.ok) throw new Error();
            const bookings = await resp.json();
            if (bookings.length === 0) { container.innerHTML = '<p class="text-muted">Нет бронирований</p>'; return; }
            bookings.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
            container.innerHTML = `
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-hover table-sm mb-0">
                            <thead><tr><th>ID</th><th>Клиент</th><th>Поле</th><th>Начало</th><th>Окончание</th><th>Стоимость</th><th>Статус</th></tr></thead>
                            <tbody>${bookings.map(b => `
                                <tr class="${b.status === 'CANCELLED' ? 'text-muted' : ''}">
                                    <td>${b.id}</td><td>${b.username}</td><td>${b.fieldName}</td><td>${formatDateTime(b.startTime)}</td>
                                    <td>${formatDateTime(b.endTime)}</td><td>${formatPrice(b.totalPrice)}</td><td>${statusBadge(b.status)}</td>
                                </tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        } catch { container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>'; }
    }

    loadFields();
    loadAllBookings();
</script>
</body>
</html>
