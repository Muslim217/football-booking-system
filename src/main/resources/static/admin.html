<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Football Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-dribbble"></i> Football Booking</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-gear"></i> Управление полями</h3>
        <button class="btn btn-book" data-bs-toggle="modal" data-bs-target="#fieldModal" onclick="openCreateModal()">
            <i class="bi bi-plus-circle"></i> Добавить поле
        </button>
    </div>

    <div id="alert-container"></div>

    <!-- Fields table -->
    <div id="fields-container">
        <div class="text-center py-5">
            <div class="spinner-border text-success"></div>
        </div>
    </div>

    <!-- All bookings -->
    <h4 class="mt-5 mb-3"><i class="bi bi-calendar-check"></i> Все бронирования</h4>
    <div id="all-bookings-container">
        <div class="text-center py-3">
            <div class="spinner-border text-success spinner-border-sm"></div>
        </div>
    </div>
</div>

<!-- Create / Edit Field Modal -->
<div class="modal fade" id="fieldModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Новое поле</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="modal-alert"></div>
                <form id="field-form">
                    <input type="hidden" id="field-id">
                    <div class="mb-3">
                        <label for="field-name" class="form-label">Название</label>
                        <input type="text" class="form-control" id="field-name" required>
                    </div>
                    <div class="mb-3">
                        <label for="field-address" class="form-label">Адрес</label>
                        <input type="text" class="form-control" id="field-address" required>
                    </div>
                    <div class="mb-3">
                        <label for="field-type" class="form-label">Тип поля</label>
                        <select class="form-select" id="field-type" required>
                            <option value="OUTDOOR">Открытое</option>
                            <option value="INDOOR">Крытое</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="field-price" class="form-label">Цена за час (₽)</label>
                        <input type="number" class="form-control" id="field-price" step="0.01" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label for="field-description" class="form-label">Описание</label>
                        <textarea class="form-control" id="field-description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-book w-100" id="btn-save">Сохранить</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">Football Booking System &copy; 2026</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    if (!isLoggedIn() || !isAdmin()) {
        window.location.href = '/';
    }

    let editingId = null;

    async function loadFields() {
        const container = document.getElementById('fields-container');
        try {
            const resp = await fetch(API_BASE + '/fields');
            if (!resp.ok) throw new Error();
            const fields = await resp.json();

            if (fields.length === 0) {
                container.innerHTML = '<p class="text-muted">Нет полей</p>';
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Название</th>
                                <th>Адрес</th>
                                <th>Тип</th>
                                <th>Цена/час</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${fields.map(f => `
                                <tr>
                                    <td>${f.id}</td>
                                    <td>${f.name}</td>
                                    <td>${f.address}</td>
                                    <td><span class="field-type-badge ${f.fieldType === 'INDOOR' ? 'indoor' : 'outdoor'}">${fieldTypeLabel(f.fieldType)}</span></td>
                                    <td>${formatPrice(f.pricePerHour)}</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary me-1" onclick='openEditModal(${JSON.stringify(f)})'>
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteField(${f.id})">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        } catch {
            container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        }
    }

    async function loadAllBookings() {
        const container = document.getElementById('all-bookings-container');
        try {
            const resp = await apiFetch('/bookings');
            if (!resp.ok) throw new Error();
            const bookings = await resp.json();

            if (bookings.length === 0) {
                container.innerHTML = '<p class="text-muted">Нет бронирований</p>';
                return;
            }

            bookings.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));

            container.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-hover table-sm">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Пользователь</th>
                                <th>Поле</th>
                                <th>Начало</th>
                                <th>Окончание</th>
                                <th>Стоимость</th>
                                <th>Статус</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${bookings.map(b => `
                                <tr class="${b.status === 'CANCELLED' ? 'table-light text-muted' : ''}">
                                    <td>${b.id}</td>
                                    <td>${b.username}</td>
                                    <td>${b.fieldName}</td>
                                    <td>${formatDateTime(b.startTime)}</td>
                                    <td>${formatDateTime(b.endTime)}</td>
                                    <td>${formatPrice(b.totalPrice)}</td>
                                    <td>${statusBadge(b.status)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        } catch {
            container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        }
    }

    function openCreateModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent = 'Новое поле';
        document.getElementById('field-form').reset();
        document.getElementById('field-id').value = '';
        document.getElementById('modal-alert').innerHTML = '';
    }

    function openEditModal(field) {
        editingId = field.id;
        document.getElementById('modalTitle').textContent = 'Редактировать поле';
        document.getElementById('field-id').value = field.id;
        document.getElementById('field-name').value = field.name;
        document.getElementById('field-address').value = field.address;
        document.getElementById('field-type').value = field.fieldType;
        document.getElementById('field-price').value = field.pricePerHour;
        document.getElementById('field-description').value = field.description || '';
        document.getElementById('modal-alert').innerHTML = '';
        new bootstrap.Modal(document.getElementById('fieldModal')).show();
    }

    document.getElementById('field-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const modalAlert = document.getElementById('modal-alert');
        modalAlert.innerHTML = '';

        const body = {
            name: document.getElementById('field-name').value,
            address: document.getElementById('field-address').value,
            fieldType: document.getElementById('field-type').value,
            pricePerHour: parseFloat(document.getElementById('field-price').value),
            description: document.getElementById('field-description').value
        };

        const url = editingId ? '/fields/' + editingId : '/fields';
        const method = editingId ? 'PUT' : 'POST';

        try {
            const resp = await apiFetch(url, { method, body: JSON.stringify(body) });
            if (resp.ok) {
                bootstrap.Modal.getInstance(document.getElementById('fieldModal')).hide();
                loadFields();
                document.getElementById('alert-container').innerHTML =
                    `<div class="alert alert-success">${editingId ? 'Поле обновлено' : 'Поле создано'}</div>`;
            } else {
                const err = await resp.json();
                const msg = err.message || Object.values(err).join(', ') || 'Ошибка сохранения';
                modalAlert.innerHTML = `<div class="alert alert-danger">${msg}</div>`;
            }
        } catch {
            modalAlert.innerHTML = '<div class="alert alert-danger">Ошибка соединения</div>';
        }
    });

    async function deleteField(id) {
        if (!confirm('Деактивировать поле? Оно исчезнет из списка для бронирования.')) return;
        try {
            const resp = await apiFetch('/fields/' + id, { method: 'DELETE' });
            if (resp.ok) {
                document.getElementById('alert-container').innerHTML =
                    '<div class="alert alert-success">Поле деактивировано</div>';
                loadFields();
            } else {
                const err = await resp.json();
                document.getElementById('alert-container').innerHTML =
                    `<div class="alert alert-danger">${err.message || 'Ошибка'}</div>`;
            }
        } catch {
            document.getElementById('alert-container').innerHTML =
                '<div class="alert alert-danger">Ошибка соединения</div>';
        }
    }

    loadFields();
    loadAllBookings();
</script>
</body>
</html>
