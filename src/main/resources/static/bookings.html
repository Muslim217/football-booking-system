<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои бронирования — Площадка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><span class="brand-icon">⚽</span> Площадка</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="container content-wrapper">
    <h3 class="section-title mb-4">Мои бронирования</h3>
    <div id="alert-container"></div>
    <div id="bookings-container">
        <div class="text-center py-5"><div class="spinner-border text-success"></div></div>
    </div>
</div>

<footer><div class="container">Площадка &copy; 2026 — Бронирование футбольных полей</div></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    if (!isLoggedIn()) window.location.href = '/login.html';

    async function loadBookings() {
        const container = document.getElementById('bookings-container');
        try {
            const resp = await apiFetch('/bookings/my');
            if (!resp.ok) throw new Error();
            const bookings = await resp.json();

            if (bookings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="bi bi-calendar-x"></i></div>
                        <p>У вас пока нет бронирований</p>
                        <a href="/" class="btn btn-book">Выбрать поле</a>
                    </div>`;
                return;
            }

            bookings.sort((a, b) => {
                if (a.status === 'CANCELLED' && b.status !== 'CANCELLED') return 1;
                if (a.status !== 'CANCELLED' && b.status === 'CANCELLED') return -1;
                return new Date(b.startTime) - new Date(a.startTime);
            });

            container.innerHTML = `
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr><th>Поле</th><th>Начало</th><th>Окончание</th><th>Стоимость</th><th>Статус</th><th></th></tr>
                            </thead>
                            <tbody>
                                ${bookings.map(b => `
                                    <tr class="${b.status === 'CANCELLED' ? 'text-muted' : ''}">
                                        <td><strong>${b.fieldName}</strong></td>
                                        <td>${formatDateTime(b.startTime)}</td>
                                        <td>${formatDateTime(b.endTime)}</td>
                                        <td>${formatPrice(b.totalPrice)}</td>
                                        <td>${statusBadge(b.status)}</td>
                                        <td>${b.status !== 'CANCELLED' ?
                                            `<button class="btn btn-sm btn-outline-danger" onclick="cancelBooking(${b.id})">Отменить</button>` : ''}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        } catch { container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>'; }
    }

    async function cancelBooking(id) {
        if (!confirm('Отменить бронирование?')) return;
        const alertContainer = document.getElementById('alert-container');
        try {
            const resp = await apiFetch('/bookings/' + id + '/cancel', { method: 'PUT' });
            if (resp.ok) {
                alertContainer.innerHTML = '<div class="alert alert-success">Бронирование отменено</div>';
                loadBookings();
            } else {
                const err = await resp.json();
                alertContainer.innerHTML = `<div class="alert alert-danger">${err.message || 'Ошибка'}</div>`;
            }
        } catch { alertContainer.innerHTML = '<div class="alert alert-danger">Ошибка соединения</div>'; }
    }

    loadBookings();
</script>
</body>
</html>
