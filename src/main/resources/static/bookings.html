<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои бронирования — Football Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-dribbble"></i> Football Booking</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="mb-4"><i class="bi bi-calendar-check"></i> Мои бронирования</h3>
    <div id="alert-container"></div>
    <div id="bookings-container">
        <div class="text-center py-5">
            <div class="spinner-border text-success"></div>
            <p class="mt-2 text-muted">Загрузка...</p>
        </div>
    </div>
</div>

<footer>
    <div class="container">Football Booking System &copy; 2026</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    if (!isLoggedIn()) {
        window.location.href = '/login.html';
    }

    async function loadBookings() {
        const container = document.getElementById('bookings-container');
        try {
            const resp = await apiFetch('/bookings/my');
            if (!resp.ok) throw new Error();
            const bookings = await resp.json();

            if (bookings.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-calendar-x" style="font-size: 3rem; color: #bbb;"></i>
                        <p class="text-muted mt-2">У вас пока нет бронирований</p>
                        <a href="/" class="btn btn-book">Выбрать поле</a>
                    </div>`;
                return;
            }

            // Sort: active first, then by date desc
            bookings.sort((a, b) => {
                if (a.status === 'CANCELLED' && b.status !== 'CANCELLED') return 1;
                if (a.status !== 'CANCELLED' && b.status === 'CANCELLED') return -1;
                return new Date(b.startTime) - new Date(a.startTime);
            });

            container.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Поле</th>
                                <th>Начало</th>
                                <th>Окончание</th>
                                <th>Стоимость</th>
                                <th>Статус</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${bookings.map(b => `
                                <tr class="${b.status === 'CANCELLED' ? 'table-light text-muted' : ''}">
                                    <td>${b.fieldName}</td>
                                    <td>${formatDateTime(b.startTime)}</td>
                                    <td>${formatDateTime(b.endTime)}</td>
                                    <td>${formatPrice(b.totalPrice)}</td>
                                    <td>${statusBadge(b.status)}</td>
                                    <td>
                                        ${b.status !== 'CANCELLED' ?
                                            `<button class="btn btn-sm btn-outline-danger" onclick="cancelBooking(${b.id})">
                                                <i class="bi bi-x-circle"></i> Отменить
                                            </button>` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        } catch {
            container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки бронирований</div>';
        }
    }

    async function cancelBooking(id) {
        if (!confirm('Вы уверены, что хотите отменить бронирование?')) return;
        const alertContainer = document.getElementById('alert-container');

        try {
            const resp = await apiFetch('/bookings/' + id + '/cancel', { method: 'PUT' });
            if (resp.ok) {
                alertContainer.innerHTML = '<div class="alert alert-success">Бронирование отменено</div>';
                loadBookings();
            } else {
                const err = await resp.json();
                alertContainer.innerHTML = `<div class="alert alert-danger">${err.message || 'Ошибка отмены'}</div>`;
            }
        } catch {
            alertContainer.innerHTML = '<div class="alert alert-danger">Ошибка соединения</div>';
        }
    }

    loadBookings();
</script>
</body>
</html>
