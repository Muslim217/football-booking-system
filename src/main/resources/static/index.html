<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Booking — Бронирование полей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-dribbble"></i> Football Booking</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="hero-section text-center">
    <div class="container">
        <h1><i class="bi bi-dribbble"></i> Бронирование футбольных полей</h1>
        <p class="lead mt-3">Выбирай поле, выбирай время — играй!</p>
    </div>
</div>

<!-- Fields list -->
<div class="container">
    <div id="alert-container"></div>
    <div class="row" id="fields-container">
        <div class="text-center py-5">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Загрузка...</span>
            </div>
            <p class="mt-2 text-muted">Загрузка полей...</p>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        Football Booking System &copy; 2026
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    async function loadFields() {
        const container = document.getElementById('fields-container');
        try {
            const resp = await fetch(API_BASE + '/fields');
            if (!resp.ok) throw new Error('Ошибка загрузки');
            const fields = await resp.json();

            if (fields.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">Пока нет доступных полей</p></div>';
                return;
            }

            container.innerHTML = fields.map(f => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0">${f.name}</h5>
                                <span class="field-type-badge ${f.fieldType === 'INDOOR' ? 'indoor' : 'outdoor'}">
                                    ${fieldTypeLabel(f.fieldType)}
                                </span>
                            </div>
                            <p class="text-muted mb-1"><i class="bi bi-geo-alt"></i> ${f.address}</p>
                            <p class="card-text flex-grow-1">${f.description || ''}</p>
                            <div class="d-flex justify-content-between align-items-center mt-auto">
                                <span class="price-tag">${formatPrice(f.pricePerHour)}/час</span>
                                <a href="/book.html?id=${f.id}" class="btn btn-book">
                                    <i class="bi bi-calendar-plus"></i> Забронировать
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = '<div class="col-12"><div class="alert alert-danger">Не удалось загрузить список полей</div></div>';
        }
    }

    loadFields();
</script>
</body>
</html>
