<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Площадка — Бронирование футбольных полей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <span class="brand-icon">⚽</span> Площадка
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="hero-section text-center">
    <div class="container">
        <div class="hero-badge">Бронирование онлайн</div>
        <h1>Площадка</h1>
        <p class="lead mt-2">Выбирай поле. Выбирай время. Играй.</p>
    </div>
</div>

<div class="container content-wrapper">
    <div id="alert-container"></div>
    <div class="row" id="fields-container">
        <div class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-3 text-muted">Загружаем поля...</p>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        Площадка &copy; 2026 — Бронирование футбольных полей
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    async function loadFields() {
        const container = document.getElementById('fields-container');
        try {
            const resp = await fetch(API_BASE + '/fields');
            if (!resp.ok) throw new Error('Ошибка загрузки');
            const fields = await resp.json();

            if (fields.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="bi bi-dribbble"></i></div>
                        <p>Пока нет доступных полей</p>
                    </div>`;
                return;
            }

            container.innerHTML = fields.map(f => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card field-card h-100">
                        <div class="card-img-top-placeholder"></div>
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0">${f.name}</h5>
                                <span class="field-type-badge ${f.fieldType === 'INDOOR' ? 'indoor' : 'outdoor'}">
                                    ${fieldTypeLabel(f.fieldType)}
                                </span>
                            </div>
                            <p class="text-muted mb-1"><i class="bi bi-geo-alt-fill"></i> ${f.address}</p>
                            <p class="owner-tag mb-2"><i class="bi bi-person-fill"></i> ${f.ownerUsername || ''}</p>
                            <p class="card-text flex-grow-1">${f.description || ''}</p>
                            <div class="d-flex justify-content-between align-items-center mt-auto pt-3" style="border-top: 1px solid var(--border-light);">
                                <span class="price-tag">${formatPrice(f.pricePerHour)}<small style="font-size:0.7em;font-weight:400;opacity:0.7">/час</small></span>
                                <a href="/book.html?id=${f.id}" class="btn btn-book btn-sm">
                                    <i class="bi bi-calendar-plus"></i> Забронировать
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = '<div class="col-12"><div class="alert alert-danger">Не удалось загрузить список полей</div></div>';
        }
    }

    loadFields();
</script>
</body>
</html>
