<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Площадка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><span class="brand-icon">⚽</span> Площадка</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="auth-container">
    <div class="card">
        <div class="card-body">
            <div class="text-center mb-4">
                <div style="font-size: 2.5rem; margin-bottom: 8px;">⚽</div>
                <h3 class="mb-1">Вход</h3>
                <p class="text-muted">Войдите в свой аккаунт</p>
            </div>
            <div id="alert-container"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Имя пользователя</label>
                    <input type="text" class="form-control" id="username" placeholder="Введите имя" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn btn-book w-100">Войти</button>
            </form>
            <p class="text-center mt-4 mb-0" style="font-size:0.92rem;">
                Нет аккаунта? <a href="/register.html" style="color:var(--pitch-green);font-weight:600;">Зарегистрируйтесь</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertContainer = document.getElementById('alert-container');
        alertContainer.innerHTML = '';

        const body = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const resp = await fetch(API_BASE + '/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (resp.ok) {
                const data = await resp.json();
                saveAuth(data);
                window.location.href = data.role === 'OWNER' ? '/owner.html' : '/';
            } else {
                const err = await resp.json();
                alertContainer.innerHTML = `<div class="alert alert-danger">${err.message || 'Неверное имя пользователя или пароль'}</div>`;
            }
        } catch (e) {
            alertContainer.innerHTML = '<div class="alert alert-danger">Ошибка соединения с сервером</div>';
        }
    });
</script>
</body>
</html>
