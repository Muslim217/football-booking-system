<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Войти — Площадка</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<div class="form-card">
  <div class="logo-row">
    <div class="logo-mark">⚽</div>
    <div>
      <div style="font-weight:700;font-size:18px;letter-spacing:-.01em">Площадка</div>
      <div style="font-size:12px;color:var(--fb-text-muted)">Бронирование спортивных площадок</div>
    </div>
  </div>

  <h1>Добро пожаловать</h1>
  <p class="sub">Войдите в аккаунт, чтобы бронировать площадки</p>

  <div class="alert alert-danger" id="errorAlert"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="username">Имя пользователя</label>
      <input class="form-control" id="username" type="text" placeholder="username" required>
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input class="form-control" id="password" type="password" placeholder="••••••••" required>
    </div>
    <button class="btn btn-primary" type="submit" style="width:100%;margin-top:8px" id="submitBtn">
      Войти
    </button>
  </form>

  <div class="form-footer">
    Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
  </div>
</div>

<div class="pitch-strip"></div>

<script src="/js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorAlert');
  btn.disabled = true; btn.textContent = 'Вход…';
  err.classList.remove('show');

  try {
    const data = await api.post('/api/auth/login', {
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value
    });
    localStorage.setItem('token', data.accessToken);
    localStorage.setItem('refreshToken', data.refreshToken);
    localStorage.setItem('username', data.username);
    localStorage.setItem('role', data.role);

    const role = data.role;
    if (role === 'ADMIN') location.href = '/admin.html';
    else if (role === 'OWNER') location.href = '/owner.html';
    else location.href = '/index.html';
  } catch (error) {
    err.textContent = error.message || 'Неверный логин или пароль';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Войти';
  }
});
</script>
</body>
</html>
