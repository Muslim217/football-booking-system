<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои поля — Площадка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><span class="brand-icon">⚽</span> Площадка</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Все поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="container content-wrapper">
    <!-- Stats -->
    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card stat-card">
                <div class="card-body text-center py-4">
                    <div class="stat-label">Мои поля</div>
                    <div class="stat-value" id="stat-fields">—</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card">
                <div class="card-body text-center py-4">
                    <div class="stat-label">Активных</div>
                    <div class="stat-value" id="stat-active" style="color:var(--pitch-green);">—</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card">
                <div class="card-body text-center py-4">
                    <div class="stat-label">Бронирований</div>
                    <div class="stat-value" id="stat-bookings" style="color:#1a56db;">—</div>
                </div>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h3 class="section-title mb-0">Мои поля</h3>
        <button class="btn btn-book" data-bs-toggle="modal" data-bs-target="#fieldModal" onclick="openCreateModal()">
            <i class="bi bi-plus-circle"></i> Добавить поле
        </button>
    </div>

    <div id="alert-container"></div>
    <div id="fields-container">
        <div class="text-center py-5"><div class="spinner-border text-success"></div></div>
    </div>

    <h4 class="section-title mt-5 mb-3">Бронирования моих полей</h4>
    <div id="bookings-container">
        <div class="text-center py-3"><div class="spinner-border text-success spinner-border-sm"></div></div>
    </div>
</div>

<!-- Field Modal -->
<div class="modal fade" id="fieldModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Новое поле</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="modal-alert"></div>
                <form id="field-form">
                    <input type="hidden" id="field-id">
                    <div class="mb-3">
                        <label for="field-name" class="form-label">Название</label>
                        <input type="text" class="form-control" id="field-name" placeholder="Арена Спорт" required>
                    </div>
                    <div class="mb-3">
                        <label for="field-address" class="form-label">Адрес</label>
                        <input type="text" class="form-control" id="field-address" placeholder="ул. Спортивная, 10" required>
                    </div>
                    <div class="mb-3">
                        <label for="field-type" class="form-label">Тип поля</label>
                        <select class="form-select" id="field-type" required>
                            <option value="OUTDOOR">Открытое</option>
                            <option value="INDOOR">Крытое</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="field-price" class="form-label">Цена за час (₽)</label>
                        <input type="number" class="form-control" id="field-price" step="0.01" min="0" placeholder="3000" required>
                    </div>
                    <div class="mb-3">
                        <label for="field-description" class="form-label">Описание</label>
                        <textarea class="form-control" id="field-description" rows="3" placeholder="Натуральный газон, раздевалки, освещение..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-book w-100"><i class="bi bi-check-circle"></i> Сохранить</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer><div class="container">Площадка &copy; 2026 — Бронирование футбольных полей</div></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    if (!isLoggedIn() || (!isOwner() && !isAdmin())) window.location.href = '/';

    let editingId = null;
    let myFieldIds = [];

    async function loadMyFields() {
        const container = document.getElementById('fields-container');
        try {
            const resp = await apiFetch('/fields/my');
            if (!resp.ok) throw new Error();
            const fields = await resp.json();
            myFieldIds = fields.map(f => f.id);

            document.getElementById('stat-fields').textContent = fields.length;
            document.getElementById('stat-active').textContent = fields.filter(f => f.isActive).length;

            if (fields.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="bi bi-building"></i></div>
                        <p>У вас пока нет полей</p>
                        <button class="btn btn-book" data-bs-toggle="modal" data-bs-target="#fieldModal" onclick="openCreateModal()">
                            <i class="bi bi-plus-circle"></i> Добавить первое поле
                        </button>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead><tr><th>Название</th><th>Адрес</th><th>Тип</th><th>Цена/час</th><th>Статус</th><th>Действия</th></tr></thead>
                            <tbody>
                                ${fields.map(f => `
                                    <tr class="${!f.isActive ? 'text-muted' : ''}">
                                        <td><strong>${f.name}</strong></td>
                                        <td>${f.address}</td>
                                        <td><span class="field-type-badge ${f.fieldType === 'INDOOR' ? 'indoor' : 'outdoor'}">${fieldTypeLabel(f.fieldType)}</span></td>
                                        <td>${formatPrice(f.pricePerHour)}</td>
                                        <td>${f.isActive ? '<span class="badge bg-success">Активно</span>' : '<span class="badge bg-secondary">Неактивно</span>'}</td>
                                        <td>
                                            <button class="btn btn-sm btn-outline-primary me-1" onclick='openEditModal(${JSON.stringify(f)})' title="Редактировать"><i class="bi bi-pencil"></i></button>
                                            ${f.isActive
                                                ? `<button class="btn btn-sm btn-outline-warning" onclick="toggleField(${f.id}, false)" title="Деактивировать"><i class="bi bi-pause-circle"></i></button>`
                                                : `<button class="btn btn-sm btn-outline-success" onclick="toggleField(${f.id}, true)" title="Активировать"><i class="bi bi-play-circle"></i></button>`}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            loadFieldBookings();
        } catch { container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>'; }
    }

    async function loadFieldBookings() {
        const container = document.getElementById('bookings-container');
        if (myFieldIds.length === 0) { container.innerHTML = '<p class="text-muted">Нет бронирований</p>'; document.getElementById('stat-bookings').textContent = '0'; return; }
        try {
            const allBookings = [];
            for (const fid of myFieldIds) {
                const resp = await fetch(API_BASE + '/bookings/field/' + fid);
                if (resp.ok) allBookings.push(...(await resp.json()));
            }
            document.getElementById('stat-bookings').textContent = allBookings.filter(b => b.status !== 'CANCELLED').length;
            if (allBookings.length === 0) { container.innerHTML = '<p class="text-muted">Пока никто не забронировал</p>'; return; }
            allBookings.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
            container.innerHTML = `
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-hover table-sm mb-0">
                            <thead><tr><th>Поле</th><th>Клиент</th><th>Начало</th><th>Окончание</th><th>Стоимость</th><th>Статус</th></tr></thead>
                            <tbody>${allBookings.map(b => `
                                <tr class="${b.status === 'CANCELLED' ? 'text-muted' : ''}">
                                    <td>${b.fieldName}</td><td>${b.username}</td><td>${formatDateTime(b.startTime)}</td>
                                    <td>${formatDateTime(b.endTime)}</td><td>${formatPrice(b.totalPrice)}</td><td>${statusBadge(b.status)}</td>
                                </tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        } catch { container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>'; }
    }

    function openCreateModal() { editingId = null; document.getElementById('modalTitle').textContent = 'Новое поле'; document.getElementById('field-form').reset(); document.getElementById('modal-alert').innerHTML = ''; }

    function openEditModal(f) {
        editingId = f.id;
        document.getElementById('modalTitle').textContent = 'Редактировать поле';
        document.getElementById('field-name').value = f.name;
        document.getElementById('field-address').value = f.address;
        document.getElementById('field-type').value = f.fieldType;
        document.getElementById('field-price').value = f.pricePerHour;
        document.getElementById('field-description').value = f.description || '';
        document.getElementById('modal-alert').innerHTML = '';
        new bootstrap.Modal(document.getElementById('fieldModal')).show();
    }

    document.getElementById('field-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const modalAlert = document.getElementById('modal-alert');
        modalAlert.innerHTML = '';
        const body = { name: document.getElementById('field-name').value, address: document.getElementById('field-address').value, fieldType: document.getElementById('field-type').value, pricePerHour: parseFloat(document.getElementById('field-price').value), description: document.getElementById('field-description').value };
        const url = editingId ? '/fields/' + editingId : '/fields';
        const method = editingId ? 'PUT' : 'POST';
        try {
            const resp = await apiFetch(url, { method, body: JSON.stringify(body) });
            if (resp.ok) { bootstrap.Modal.getInstance(document.getElementById('fieldModal')).hide(); loadMyFields(); document.getElementById('alert-container').innerHTML = `<div class="alert alert-success">${editingId ? 'Поле обновлено' : 'Поле добавлено'}</div>`; setTimeout(() => document.getElementById('alert-container').innerHTML = '', 3000); }
            else { const err = await resp.json(); modalAlert.innerHTML = `<div class="alert alert-danger">${err.message || Object.values(err).join(', ') || 'Ошибка'}</div>`; }
        } catch { modalAlert.innerHTML = '<div class="alert alert-danger">Ошибка соединения</div>'; }
    });

    async function toggleField(id, activate) {
        if (!confirm(`${activate ? 'Активировать' : 'Деактивировать'} поле?`)) return;
        try {
            const url = activate ? `/fields/${id}/activate` : `/fields/${id}`;
            const method = activate ? 'PUT' : 'DELETE';
            const resp = await apiFetch(url, { method });
            if (resp.ok) { document.getElementById('alert-container').innerHTML = `<div class="alert alert-success">Поле ${activate ? 'активировано' : 'деактивировано'}</div>`; setTimeout(() => document.getElementById('alert-container').innerHTML = '', 3000); loadMyFields(); }
            else { const err = await resp.json(); document.getElementById('alert-container').innerHTML = `<div class="alert alert-danger">${err.message || 'Ошибка'}</div>`; }
        } catch { document.getElementById('alert-container').innerHTML = '<div class="alert alert-danger">Ошибка соединения</div>'; }
    }

    loadMyFields();
</script>
</body>
</html>
