<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Площадка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><span class="brand-icon">⚽</span> Площадка</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="auth-container">
    <div class="card">
        <div class="card-body">
            <div class="text-center mb-4">
                <div style="font-size: 2.5rem; margin-bottom: 8px;">⚽</div>
                <h3 class="mb-1">Регистрация</h3>
                <p class="text-muted">Создайте аккаунт</p>
            </div>
            <div id="alert-container"></div>
            <form id="register-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Имя пользователя</label>
                    <input type="text" class="form-control" id="username" minlength="3" maxlength="50" placeholder="Минимум 3 символа" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="example@mail.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" minlength="6" placeholder="Минимум 6 символов" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Я регистрируюсь как</label>
                    <div class="d-flex gap-3">
                        <div class="form-check flex-fill p-3 role-option" id="role-user-card">
                            <input class="form-check-input" type="radio" name="role" id="role-user" value="USER" checked>
                            <label class="form-check-label w-100" for="role-user">
                                <strong><i class="bi bi-person-fill"></i> Клиент</strong>
                                <small class="d-block" style="color:var(--text-muted);">Бронировать поля</small>
                            </label>
                        </div>
                        <div class="form-check flex-fill p-3 role-option" id="role-owner-card">
                            <input class="form-check-input" type="radio" name="role" id="role-owner" value="OWNER">
                            <label class="form-check-label w-100" for="role-owner">
                                <strong><i class="bi bi-building"></i> Владелец</strong>
                                <small class="d-block" style="color:var(--text-muted);">Сдавать поля</small>
                            </label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-book w-100">Создать аккаунт</button>
            </form>
            <p class="text-center mt-4 mb-0" style="font-size:0.92rem;">
                Уже есть аккаунт? <a href="/login.html" style="color:var(--pitch-green);font-weight:600;">Войдите</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertContainer = document.getElementById('alert-container');
        alertContainer.innerHTML = '';

        const role = document.querySelector('input[name="role"]:checked').value;

        const body = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: role
        };

        try {
            const resp = await fetch(API_BASE + '/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (resp.ok) {
                const data = await resp.json();
                saveAuth(data);
                window.location.href = data.role === 'OWNER' ? '/owner.html' : '/';
            } else {
                const err = await resp.json();
                const msg = err.message || Object.values(err).join(', ') || 'Ошибка регистрации';
                alertContainer.innerHTML = `<div class="alert alert-danger">${msg}</div>`;
            }
        } catch (e) {
            alertContainer.innerHTML = '<div class="alert alert-danger">Ошибка соединения с сервером</div>';
        }
    });
</script>
</body>
</html>
