<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Football Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-dribbble"></i> Football Booking</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Поля</a></li>
            </ul>
            <ul class="navbar-nav" id="nav-auth"></ul>
        </div>
    </div>
</nav>

<div class="auth-container">
    <div class="card">
        <div class="card-body p-4">
            <h3 class="text-center mb-4"><i class="bi bi-person-plus"></i> Регистрация</h3>
            <div id="alert-container"></div>
            <form id="register-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Имя пользователя</label>
                    <input type="text" class="form-control" id="username" minlength="3" maxlength="50" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-book w-100">Зарегистрироваться</button>
            </form>
            <p class="text-center mt-3 mb-0">
                Уже есть аккаунт? <a href="/login.html">Войдите</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertContainer = document.getElementById('alert-container');
        alertContainer.innerHTML = '';

        const body = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        try {
            const resp = await fetch(API_BASE + '/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (resp.ok) {
                const data = await resp.json();
                saveAuth(data);
                window.location.href = '/';
            } else {
                const err = await resp.json();
                const msg = err.message || Object.values(err).join(', ') || 'Ошибка регистрации';
                alertContainer.innerHTML = `<div class="alert alert-danger">${msg}</div>`;
            }
        } catch (e) {
            alertContainer.innerHTML = '<div class="alert alert-danger">Ошибка соединения с сервером</div>';
        }
    });
</script>
</body>
</html>
